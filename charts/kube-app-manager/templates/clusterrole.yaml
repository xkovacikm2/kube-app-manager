apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-app-manager.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "kube-app-manager.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["apps.kovko.top"]
    resources: ["webendpoints"]
    verbs: ["get", "list"]
